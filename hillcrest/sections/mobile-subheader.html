<!-- ============================================================
     MOBILE SUB-HEADER — markup + its own CSS
     (sticks to the top once you scroll past the hero, mobile only)
     ============================================================ -->
<style>
  .mobile-sub-header-sentinel {
    height: 0;
  }
  .mobile-sub-header {
    display: none;
    align-items: center;
    justify-content: flex-end;
    padding: 14px 24px;
    background: rgba(255, 255, 255, 0.95);
    -webkit-backdrop-filter: blur(20px);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    position: relative;
    z-index: 90;
  }
  .mobile-sub-header.is-fixed {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.06);
  }
  .mobile-sub-logo {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  .mobile-sub-logo img {
    height: 32px;
  }
  .mobile-sub-icons {
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .mobile-sub-icon-btn {
    background: none;
    border: none;
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000000;
    padding: 0;
    border-radius: 50%;
    transition: background 0.25s cubic-bezier(0.4, 0, 0.2, 1),
      color 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .mobile-sub-icon-btn:hover,
  .mobile-sub-icon-btn:focus-visible {
    background: #ee93b4;
    color: #ffffff;
  }
  .mobile-sub-icon-btn svg {
    width: 20px;
    height: 20px;
  }
  .mobile-sub-header-spacer {
    height: 0;
  }

  @media (max-width: 1023px) {
    .mobile-sub-header {
      display: flex;
    }
  }
</style>

<div class="mobile-sub-header-sentinel" id="mobileSubHeaderSentinel" aria-hidden="true"></div>
<header class="mobile-sub-header" id="mobileSubHeader">
    <a class="mobile-sub-logo" href="/" aria-label="Hillcrest Bakery &amp; Deli — home">
        <span class="logo-wordmark logo-wordmark--sm">Hillcrest<small>EST. 1972 · BAKERY &amp;
                DELI</small></span>
    </a>
    <div class="mobile-sub-icons">
        <button class="mobile-sub-icon-btn" aria-label="Account"><svg>
                <use href="#ic-user" />
            </svg></button>
        <button class="mobile-sub-icon-btn" aria-label="Search"><svg>
                <use href="#ic-search" />
            </svg></button>
        <button class="mobile-sub-icon-btn" aria-label="Cart, 0 items"><svg>
                <use href="#ic-cart" />
            </svg></button>
    </div>
</header>
<div class="mobile-sub-header-spacer" id="mobileSubHeaderSpacer" aria-hidden="true"></div>
