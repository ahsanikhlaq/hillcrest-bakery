<main>
        <section class="hero" aria-label="Cakes and desserts">
            <div class="hero-bg-wrap">
                <img class="hero-bg-img is-visible" id="heroBgImgA" src="" alt="">
                <img class="hero-bg-img" id="heroBgImgB" src="" alt="">

                <div class="hero-content">
                    <h1 class="hero-title">Cakes &amp; Desserts</h1>

                    <div class="hero-bottom-group">
                        <div class="hero-thumbs" id="heroThumbs" aria-label="Choose a featured item">
                            <div class="hero-thumb is-active" tabindex="0" role="button" aria-label="Show doughnut"
                                aria-pressed="true">
                                <img src="assets/images/Component 298 (1).png" alt="Doughnut">
                            </div>
                            <div class="hero-thumb" tabindex="0" role="button" aria-label="Show cake"
                                aria-pressed="false">
                                <img src="assets/images/Component 298 (2).png" alt="Cake">
                            </div>
                            <div class="hero-thumb" tabindex="0" role="button" aria-label="Show pastries"
                                aria-pressed="false">
                                <img src="assets/images/Component 298 (3).png" alt="Croissant">
                            </div>
                        </div>

                        <a href="#shop" class="hero-explore-btn">
                            <span class="hero-explore-label">Explore More Product</span>
                            <span class="hero-explore-icon"><svg width="22" height="14" viewBox="0 0 22 14" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path d="M1 7H21M14.8462 13L21 7L14.8462 1" stroke="black" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                            </span>
                        </a>
                    </div>
                </div>
            </div>
        </section>
    </main>
