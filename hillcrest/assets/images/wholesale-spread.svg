<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 720" role="img" aria-label="A table spread of fresh baked goods">
  <defs>
    <linearGradient id="wsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a3728"/>
      <stop offset="100%" stop-color="#2c2018"/>
    </linearGradient>
    <radialGradient id="wsGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#7a5c3e" stop-opacity=".6"/>
      <stop offset="100%" stop-color="#2c2018" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="720" fill="url(#wsBg)"/>
  <rect width="640" height="720" fill="url(#wsGlow)"/>
  <!-- tiered stands with cakes -->
  <g>
    <ellipse cx="180" cy="250" rx="120" ry="22" fill="#000" opacity=".25"/>
    <rect x="90" y="200" width="180" height="46" rx="10" fill="#f3ead9"/>
    <rect x="90" y="200" width="180" height="14" fill="#e8a0b8"/>
    <circle cx="130" cy="196" r="9" fill="#c43e63"/>
    <circle cx="160" cy="192" r="9" fill="#c43e63"/>
    <circle cx="200" cy="194" r="9" fill="#c43e63"/>
    <circle cx="235" cy="196" r="9" fill="#c43e63"/>
  </g>
  <g>
    <ellipse cx="440" cy="330" rx="140" ry="26" fill="#000" opacity=".25"/>
    <rect x="330" y="272" width="220" height="56" rx="12" fill="#e7c9a0"/>
    <rect x="330" y="272" width="220" height="16" fill="#b8794a"/>
  </g>
  <g>
    <ellipse cx="250" cy="470" rx="170" ry="30" fill="#000" opacity=".28"/>
    <rect x="110" y="404" width="280" height="66" rx="14" fill="#5a3a26"/>
    <rect x="110" y="404" width="280" height="18" fill="#7a4e30"/>
    <g fill="#f3ead9">
      <circle cx="160" cy="392" r="10"/>
      <circle cx="220" cy="388" r="10"/>
      <circle cx="290" cy="390" r="10"/>
      <circle cx="345" cy="394" r="10"/>
    </g>
  </g>
  <!-- little pastries -->
  <g fill="#d9a566">
    <circle cx="470" cy="520" r="34"/>
    <circle cx="540" cy="560" r="30"/>
    <circle cx="150" cy="590" r="30"/>
    <circle cx="360" cy="600" r="34"/>
  </g>
  <g fill="#8a5a34" opacity=".5">
    <circle cx="470" cy="520" r="14"/>
    <circle cx="540" cy="560" r="12"/>
    <circle cx="150" cy="590" r="12"/>
    <circle cx="360" cy="600" r="14"/>
  </g>
